apiVersion: v2
name: ravenops
description: A Helm chart for deploying RavenOps - AI-powered CI/CD Observability Platform on Kubernetes
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: mongodb
    version: 15.6.14
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  - name: redis
    version: 19.1.5
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: rabbitmq
    version: 12.13.0
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
